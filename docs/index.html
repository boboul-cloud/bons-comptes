<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bons Comptes</title>
<style>
:root {
  --primary: #6C5CE7;
  --primary-light: #A29BFE;
  --primary-dark: #4834D4;
  --accent: #00CEC9;
  --positive: #00B894;
  --negative: #E17055;
  --warning: #FDCB6E;
  --info: #74B9FF;
  --bg: #F8F9FD;
  --card: #FFFFFF;
  --text: #2D3436;
  --text2: #636E72;
  --radius: 16px;
  --shadow: 0 4px 20px rgba(108,92,231,0.1);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.gradient-bg {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
}

/* Landing Page */
.landing {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; padding: 24px; text-align: center;
}
.landing-icon { font-size: 72px; margin-bottom: 16px; }
.landing h1 { font-size: 32px; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
.landing p { color: var(--text2); margin-bottom: 32px; max-width: 400px; }
.landing textarea {
  width: 100%; max-width: 500px; height: 180px; border: 2px dashed var(--primary-light);
  border-radius: var(--radius); padding: 16px; font-family: monospace; font-size: 13px;
  resize: vertical; outline: none; transition: border-color 0.3s;
}
.landing textarea:focus { border-color: var(--primary); }
.landing textarea::placeholder { color: var(--primary-light); }

.btn {
  display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px;
  border: none; border-radius: 50px; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all 0.3s; text-decoration: none;
}
.btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(108,92,231,0.3); }
.btn-accent { background: linear-gradient(135deg, var(--accent), #00B5B0); color: #fff; }
.btn-positive { background: linear-gradient(135deg, var(--positive), #00A381); color: #fff; }
.btn-negative { background: linear-gradient(135deg, var(--negative), #D35B45); color: #fff; }
.btn-outline {
  background: transparent; border: 2px solid var(--primary); color: var(--primary);
}
.btn-outline:hover { background: var(--primary); color: #fff; }
.btn-sm { padding: 8px 16px; font-size: 13px; }
.btn-icon { width: 40px; height: 40px; padding: 0; justify-content: center; border-radius: 50%; }

.mt-16 { margin-top: 16px; }
.mt-8 { margin-top: 8px; }
.gap-8 { gap: 8px; }
.flex-center { display: flex; align-items: center; justify-content: center; }

/* App Layout */
.app { display: none; }
.app.active { display: block; }
.landing.hidden { display: none; }

/* Header */
.header {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff; padding: 24px 20px 60px; text-align: center; position: relative;
}
.header-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.header-location { font-size: 13px; opacity: 0.8; margin-bottom: 12px; }
.header-amount { font-size: 42px; font-weight: 800; letter-spacing: -1px; }
.header-currency { font-size: 18px; opacity: 0.8; font-weight: 400; }
.header-meta { display: flex; gap: 24px; justify-content: center; margin-top: 12px; font-size: 13px; opacity: 0.8; }
.header-actions {
  position: absolute; top: 16px; right: 16px; display: flex; gap: 8px;
}
.header-actions button {
  background: rgba(255,255,255,0.2); border: none; color: #fff; width: 36px; height: 36px;
  border-radius: 50%; cursor: pointer; font-size: 16px; transition: background 0.3s;
}
.header-actions button:hover { background: rgba(255,255,255,0.3); }

/* Stats Row */
.stats-row {
  display: flex; gap: 12px; padding: 0 16px; margin-top: -40px; position: relative; z-index: 1;
}
.stat-card {
  flex: 1; background: var(--card); border-radius: var(--radius); padding: 14px 12px;
  text-align: center; box-shadow: var(--shadow);
}
.stat-icon { font-size: 20px; margin-bottom: 4px; }
.stat-value { font-size: 18px; font-weight: 700; }
.stat-label { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* Tabs */
.tabs {
  display: flex; gap: 8px; padding: 16px 16px 8px; overflow-x: auto;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; padding: 8px 16px; border-radius: 50px; font-size: 13px; font-weight: 600;
  border: none; cursor: pointer; transition: all 0.3s; white-space: nowrap;
  background: rgba(108,92,231,0.1); color: var(--primary);
}
.tab.active { background: var(--primary); color: #fff; }

/* Cards */
.card {
  background: var(--card); border-radius: var(--radius); padding: 16px;
  box-shadow: var(--shadow); margin: 0 16px 12px;
}
.section-title {
  font-size: 14px; font-weight: 700; color: var(--text2); padding: 16px 16px 8px;
  display: flex; align-items: center; gap: 8px;
}

/* Expense Card */
.expense-card {
  display: flex; align-items: center; gap: 14px;
}
.expense-icon {
  width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 18px; flex-shrink: 0;
}
.expense-icon.expense { background: rgba(225,112,85,0.12); }
.expense-icon.reimb { background: rgba(0,184,148,0.12); }
.expense-info { flex: 1; min-width: 0; }
.expense-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.expense-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.expense-amount { text-align: right; flex-shrink: 0; }
.expense-amount-value { font-size: 15px; font-weight: 700; }
.expense-amount-date { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* Balance */
.balance-row { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
.avatar {
  width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 20px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
}
.avatar-sm { width: 32px; height: 32px; font-size: 16px; }
.balance-name { font-size: 14px; font-weight: 600; flex: 1; }
.balance-value { font-size: 14px; font-weight: 700; }
.progress-bar {
  height: 6px; background: #eee; border-radius: 3px; margin-top: 6px; overflow: hidden;
}
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

/* Settlement */
.settlement-card {
  display: flex; align-items: center; justify-content: center; gap: 16px; padding: 12px 0;
}
.settlement-arrow { font-size: 20px; color: var(--negative); font-weight: 700; }
.settlement-amount { font-size: 14px; font-weight: 700; color: var(--negative); }
.settlement-name { font-size: 12px; color: var(--text2); margin-top: 4px; text-align: center; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100;
  display: none; align-items: flex-end; justify-content: center;
  animation: fadeIn 0.3s ease;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--bg); width: 100%; max-width: 500px; max-height: 90vh;
  border-radius: 24px 24px 0 0; padding: 0; overflow-y: auto;
  animation: slideUp 0.3s ease;
}
@media(min-width:600px) {
  .modal-overlay.active { align-items: center; }
  .modal { border-radius: 24px; max-height: 85vh; margin: 20px; }
}
.modal-header {
  padding: 20px; text-align: center; position: sticky; top: 0;
  background: var(--bg); z-index: 1; border-bottom: 1px solid #eee;
}
.modal-handle {
  width: 40px; height: 4px; background: #ddd; border-radius: 2px;
  margin: 0 auto 12px;
}
.modal-title { font-size: 18px; font-weight: 700; }
.modal-body { padding: 20px; }
.modal-footer { padding: 16px 20px; position: sticky; bottom: 0; background: var(--bg); }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

/* Form */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; }
.form-input {
  width: 100%; padding: 12px 14px; border: 2px solid #eee; border-radius: 12px;

}
.form-input:focus { border-color: var(--primary-light); }
.form-input-hero {
  font-size: 36px; font-weight: 800; text-align: center; border: none;
  background: transparent; color: #fff; width: 100%; outline: none;
}
.form-input-hero::placeholder { color: rgba(255,255,255,0.5); }
.amount-hero {
  background: linear-gradient(135deg, var(--negative), #D35B45);
  border-radius: var(--radius); padding: 24px; margin-bottom: 20px; text-align: center;
}
.amount-hero.reimb { background: linear-gradient(135deg, var(--positive), #00A381); }
.amount-hero label { color: rgba(255,255,255,0.8); font-size: 13px; font-weight: 600; }

/* Chips */
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 8px 14px; border-radius: 50px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.3s; border: 2px solid transparent;
  background: #f0f0f0; color: var(--text);
}
.chip.selected { background: var(--primary); color: #fff; border-color: var(--primary); }
.chip.selected-from { background: var(--negative); color: #fff; border-color: var(--negative); }
.chip.selected-to { background: var(--positive); color: #fff; border-color: var(--positive); }

/* Empty */
.empty { text-align: center; padding: 48px 20px; color: var(--text2); }
.empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }

/* Toast */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #fff; padding: 12px 24px; border-radius: 50px;
  font-size: 14px; font-weight: 600; z-index: 200; opacity: 0;
  transition: opacity 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; }

/* Share Panel */
.share-section { padding: 16px; }


/* Responsive */
@media(max-width: 400px) {
  .header-amount { font-size: 32px; }
  .stats-row { gap: 8px; padding: 0 12px; }
  .stat-card { padding: 10px 8px; }
  .card { margin: 0 12px 10px; }
}

/* Delete button */
.delete-btn {
  background: none; border: none; color: var(--negative); cursor: pointer;
  font-size: 16px; padding: 4px 8px; opacity: 0.6; transition: opacity 0.3s;
}
.delete-btn:hover { opacity: 1; }

/* Category grid */
.cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
.cat-item {
  padding: 10px 8px; border-radius: 12px; text-align: center; cursor: pointer;
  border: 2px solid transparent; background: #f5f5f5; transition: all 0.3s;
  font-size: 12px; font-weight: 600;
}
.cat-item.selected { border-color: var(--primary); background: rgba(108,92,231,0.1); }
.cat-icon { font-size: 22px; margin-bottom: 4px; }

/* Split type */
.split-tabs { display: flex; gap: 4px; background: #f0f0f0; border-radius: 10px; padding: 3px; }
.split-tab {
  flex: 1; padding: 8px; text-align: center; border-radius: 8px; font-size: 13px;
  font-weight: 600; cursor: pointer; transition: all 0.3s; border: none; background: transparent;
}
.split-tab.active { background: var(--card); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
</style>

<body>

<script>
// ===== i18n =====

    settlements: "Suggested settlements", categories: "Categories", payments: "Payments",
    add_expense: "Add expense", add_reimbursement: "Add reimbursement",
    paid_by: "Paid by", split_among: "Split among", amount: "Amount",
    title: "Title", save: "Save", cancel: "Cancel",
    no_expenses: "No expenses yet", no_reimbursements: "No reimbursements yet",
    all_settled: "All settled!", total: "Total", avg: "Avg/person",
    participants: "Participants", expense_count: "Expenses",
    equal: "Equal", custom: "Custom", percentage: "Percentage",
    from: "From", to: "To", date: "Date", notes: "Notes", category: "Category",
    share: "Share", copy_link: "Copy link", copy_json: "Copy JSON",
    export_updated: "Export changes",
    link_copied: "Link copied!", json_copied: "JSON copied!",
    back_to_app: "Copy the updated JSON and import it in the app.",
    open_in_app: "Open in app",
    location: "Location", no_category: "No category",
    owes: "owes", is_owed: "is owed", settled: "settled",
    partial: "Partial", payment_method: "Payment method",
    delete_confirm: "Delete?", deleted: "Deleted",
    total_reimbursed: "Total reimbursed", new_expense_added: "Expense added!",
    new_reimb_added: "Reimbursement added!", description: "Description",
    share_options: "Share options", view_share: "Share & Export",
  }
};

const lang = (navigator.language || 'fr').startsWith('en') ? 'en' : 'fr';
function t(key) { return T[lang][key] || T.fr[key] || key; }

// ===== State =====
let state = { campaign: null, participants: [], expenses: [], reimbursements: [], categories: [], paymentMethods: [] };
let currentTab = 'expenses';

// Category icons mapping
const catIcons = {
  'Alimentation': '🍽️', 'Food': '🍽️', 'Transport': '🚗',
  'Hébergement': '🏠', 'Lodging': '🏠', 'Courses': '🛒', 'Groceries': '🛒',
  'Divertissement': '🎭', 'Entertainment': '🎭', 'Santé': '💊', 'Health': '💊',
  'Shopping': '🛍️', 'Autre': '📦', 'Other': '📦'
};
const pmIcons = {
  'Espèces': '💵', 'Cash': '💵', 'Carte': '💳', 'Card': '💳',
  'Chèque': '📝', 'Check': '📝', 'Virement': '🏦', 'Transfer': '🏦',
  'Autre': '📦', 'Other': '📦'
};

// ===== URL Encoding (with zlib compression) =====
async function compressBytes(bytes) {
  try {
    const cs = new CompressionStream('deflate-raw');
    const writer = cs.writable.getWriter();
    writer.write(bytes);
    writer.close();
    const chunks = [];
    const reader = cs.readable.getReader();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
    }
    const total = chunks.reduce((a, c) => a + c.length, 0);
    const result = new Uint8Array(total);
    let off = 0;
    for (const c of chunks) { result.set(c, off); off += c.length; }
    return result;
  } catch(e) { return null; }
}

async function decompressBytes(bytes) {
  const formats = ['deflate-raw', 'deflate'];
  for (const fmt of formats) {
    try {
      const ds = new DecompressionStream(fmt);
      const writer = ds.writable.getWriter();
      writer.write(bytes);
      writer.close();
      const chunks = [];
      const reader = ds.readable.getReader();
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
      }
      const total = chunks.reduce((a, c) => a + c.length, 0);
      const result = new Uint8Array(total);
      let off = 0;
      for (const c of chunks) { result.set(c, off); off += c.length; }
      return result;
    } catch(e) { continue; }
  }
  return null;
}

function b64ToBytes(b64) {
  const raw = b64.replace(/-/g, '+').replace(/_/g, '/');
  const pad = raw + '===='.slice(raw.length % 4 || 4);
  const binStr = atob(pad);
  return Uint8Array.from(binStr, c => c.charCodeAt(0));
}

function bytesToB64(bytes) {
  const binStr = Array.from(bytes, b => String.fromCharCode(b)).join('');
  return btoa(binStr).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function encodeData(jsonStr) {
  try {
    const bytes = new TextEncoder().encode(jsonStr);
    const compressed = await compressBytes(bytes);
    if (compressed) {
      return 'z' + bytesToB64(compressed);
    }
    return bytesToB64(bytes);
  } catch(e) { return ''; }
}

async function decodeData(b64) {
  try {
    if (b64.startsWith('z')) {
      const bytes = b64ToBytes(b64.slice(1));
      const decompressed = await decompressBytes(bytes);
      if (decompressed) return new TextDecoder().decode(decompressed);
      return '';
    }
    // Legacy uncompressed format
    const bytes = b64ToBytes(b64);
    return new TextDecoder().decode(bytes);
  } catch(e) { return ''; }
}

function generateUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random()*16|0;
    return (c === 'x' ? r : (r&0x3|0x8)).toString(16);
  }).toUpperCase();
}

// ===== Business Logic =====
function getParticipant(id) { return state.participants.find(p => p.id === id); }
function getCategory(id) { return state.categories.find(c => c.id === id); }
function getPaymentMethod(id) { return state.paymentMethods.find(m => m.id === id); }

function expenseShare(expense, participantID) {
  if (!expense.splitAmongIDs.includes(participantID)) return 0;
  switch(expense.splitType) {
    case 'equal': return expense.amount / expense.splitAmongIDs.length;
    case 'custom': return (expense.customSplits && expense.customSplits[participantID]) || 0;
    case 'percentage':
      const pct = (expense.customSplits && expense.customSplits[participantID]) || 0;
      return expense.amount * pct / 100;
    default: return expense.amount / expense.splitAmongIDs.length;
  }
}

function computeBalance(participantID) {
  let balance = 0;
  for (const e of state.expenses) {
    if (e.campaignID !== state.campaign.id) continue;
    if (e.paidByID === participantID) balance += e.amount;
    balance -= expenseShare(e, participantID);
  }
  for (const r of state.reimbursements) {
    if (r.campaignID !== state.campaign.id) continue;
    if (r.fromID === participantID) balance += r.amount;
    if (r.toID === participantID) balance -= r.amount;
  }
  return balance;
}

function allBalances() {
  return state.participants
    .filter(p => state.campaign.participantIDs.includes(p.id))
    .map(p => ({ participant: p, balance: computeBalance(p.id) }))
    .sort((a,b) => b.balance - a.balance);
}

function computeSettlements() {
  const bals = allBalances();
  let debtors = [], creditors = [];
  for (const {participant, balance} of bals) {
    if (balance < -0.01) debtors.push({p: participant, amount: -balance});
    else if (balance > 0.01) creditors.push({p: participant, amount: balance});
  }
  debtors.sort((a,b) => b.amount - a.amount);
  creditors.sort((a,b) => b.amount - a.amount);
  const settlements = [];
  let i=0, j=0;
  while (i < debtors.length && j < creditors.length) {
    const amount = Math.min(debtors[i].amount, creditors[j].amount);
    if (amount > 0.01) {
      settlements.push({ from: debtors[i].p, to: creditors[j].p, amount: Math.round(amount*100)/100 });
    }
    debtors[i].amount -= amount;
    creditors[j].amount -= amount;
    if (debtors[i].amount < 0.01) i++;
    if (creditors[j].amount < 0.01) j++;
  }
  return settlements;
}

function totalExpenses() {
  return state.expenses.filter(e => e.campaignID === state.campaign.id).reduce((s,e) => s+e.amount, 0);
}

function campaignExpenses() {
  return state.expenses.filter(e => e.campaignID === state.campaign.id).sort((a,b) => new Date(b.date)-new Date(a.date));
}

function campaignReimbursements() {
  return state.reimbursements.filter(r => r.campaignID === state.campaign.id).sort((a,b) => new Date(b.date)-new Date(a.date));
}

function stateToJSON() {
  const data = {
    campaigns: [state.campaign],
    participants: state.participants.filter(p => state.campaign.participantIDs.includes(p.id)),
    expenses: state.expenses.filter(e => e.campaignID === state.campaign.id),
    reimbursements: state.reimbursements.filter(r => r.campaignID === state.campaign.id),
    categories: state.categories,
    paymentMethods: state.paymentMethods
  };
  return JSON.stringify(data, null, 2);
}

// Compact export for URL sharing (no defaults, no nulls, no pretty-print)
function stateToCompactJSON() {
  const usedCatIDs = new Set(state.expenses.map(e => e.categoryID).filter(Boolean));
  const usedPmIDs = new Set(state.reimbursements.map(r => r.paymentMethodID).filter(Boolean));
  const data = {
    campaigns: [state.campaign],
    participants: state.participants.filter(p => state.campaign.participantIDs.includes(p.id)),
    expenses: state.expenses.filter(e => e.campaignID === state.campaign.id),
    reimbursements: state.reimbursements.filter(r => r.campaignID === state.campaign.id),
    categories: state.categories.filter(c => usedCatIDs.has(c.id)),
    paymentMethods: state.paymentMethods.filter(m => usedPmIDs.has(m.id))
  };
  // UUID indexing: replace UUIDs with "$0", "$1" etc.
  const uuidRe = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
  const uuids = []; const uuidMap = {};
  function idx(u) { if (!(u in uuidMap)) { uuidMap[u] = uuids.length; uuids.push(u); } return '$' + uuidMap[u]; }
  function compact(obj) {
    if (typeof obj === 'string') return uuidRe.test(obj) ? idx(obj) : obj;
    if (Array.isArray(obj)) return obj.map(compact);
    if (obj && typeof obj === 'object') {
      const r = {};
      for (const [k, v] of Object.entries(obj)) { r[uuidRe.test(k) ? idx(k) : k] = compact(v); }
      return r;
    }
    return obj;
  }
  const compactData = compact(data);
  compactData._u = uuids;
  // Strip null/empty values to reduce size
  return JSON.stringify(compactData, (k, v) => {
    if (v === null || v === '' || (typeof v === 'object' && !Array.isArray(v) && v !== null && Object.keys(v).length === 0)) return undefined;
    return v;
  });
}

async function generateShareURL() {
  const json = stateToCompactJSON();
  const encoded = await encodeData(json);
  return window.location.origin + window.location.pathname + '#' + encoded;
}

// ===== Load Data =====
function expandUUIDs(data) {
  if (!data._u) return data;
  const uuids = data._u; delete data._u;
  const refRe = /^\$(\d+)$/;
  function expand(obj) {
    if (typeof obj === 'string') { const m = obj.match(refRe); return m ? uuids[parseInt(m[1])] : obj; }
    if (Array.isArray(obj)) return obj.map(expand);
    if (obj && typeof obj === 'object') {
      const r = {};
      for (const [k, v] of Object.entries(obj)) {
        const m = k.match(refRe); r[m ? uuids[parseInt(m[1])] : k] = expand(v);
      }
      return r;
    }
    return obj;
  }
  return expand(data);
}

function loadData(jsonStr) {
  try {
    let data = JSON.parse(jsonStr);
    data = expandUUIDs(data);
    if (!data.campaigns || !data.campaigns.length) throw new Error('No campaign');
    state.campaign = data.campaigns[0];
    state.participants = data.participants || [];
    const cid = state.campaign.id;
    state.expenses = (data.expenses || []).map(e => ({
      ...e,
      campaignID: e.campaignID || cid,
      customSplits: e.customSplits || {}
    }));
    state.reimbursements = (data.reimbursements || []).map(r => ({
      ...r,
      campaignID: r.campaignID || cid
    }));
    state.categories = data.categories || [];
    state.paymentMethods = data.paymentMethods || [];
    // Reconstruct missing ID arrays from actual data
    if (!state.campaign.participantIDs) state.campaign.participantIDs = state.participants.map(p => p.id);
    if (!state.campaign.expenseIDs) state.campaign.expenseIDs = state.expenses.map(e => e.id);
    if (!state.campaign.reimbursementIDs) state.campaign.reimbursementIDs = state.reimbursements.map(r => r.id);
    return true;
  } catch(e) {
    console.error('Parse error:', e);
    return false;
  }
}

function loadFromInput() {
  const json = document.getElementById('jsonInput').value.trim();
  if (!json) return;
  if (loadData(json)) {
    showApp();
  } else {
    const el = document.getElementById('errorMsg');
    el.textContent = 'JSON invalide. Vérifiez le format.';
    el.style.display = 'block';
  }
}

async function loadFromURL() {
  const hash = window.location.hash.slice(1);
  if (!hash) return false;
  const json = await decodeData(hash);
  if (!json) return false;
  return loadData(json);
}

function renderCategories() {
  const exps = campaignExpenses();
  const grouped = {};
  for (const e of exps) {
    const key = e.categoryID || '__none__';
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(e);
  }
  const total = exps.reduce((s,e)=>s+e.amount, 0);
  return Object.entries(grouped).map(([catID, items]) => {
    const cat = catID !== '__none__' ? getCategory(catID) : null;
    const name = cat ? cat.name : t('no_category');
    const icon = cat ? (catIcons[cat.name] || '📦') : '❓';
    const catTotal = items.reduce((s,e)=>s+e.amount, 0);
    const pct = total > 0 ? catTotal/total*100 : 0;
    return `<div class="card"><div style="display:flex;gap:14px;align-items:center">

      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">

}

let selectedSplitType = 'equal';

function selectCat(el) {
  document.querySelectorAll('#expCatGrid .cat-item').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedCatID = el.dataset.id;
}

function selectPaidBy(el) {
  document.querySelectorAll('#expPaidBy .chip').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedPaidByID = el.dataset.id;
}

function toggleSplit(el) {
  el.classList.toggle('selected');
  updateCustomFields();
}

function selectSplitType(el) {
  document.querySelectorAll('.split-tab').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  selectedSplitType = el.dataset.type;
  updateCustomFields();
}

function updateCustomFields() {
  const container = document.getElementById('customSplitFields');
  if (!container) return;
  if (selectedSplitType === 'equal') { container.style.display = 'none'; return; }
  container.style.display = 'block';
  const selected = [...document.querySelectorAll('#expSplitAmong .chip.selected')];
  const label = selectedSplitType === 'percentage' ? '%' : esc(state.campaign.currency);
  container.innerHTML = selected.map(chip => {
    const p = getParticipant(chip.dataset.id);
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="flex:1;font-size:13px">${p?.avatarEmoji||'👤'} ${esc(p?.name||'')}</span>
      <input type="number" step="0.01" class="form-input" style="width:100px;padding:8px" data-pid="${chip.dataset.id}" placeholder="0" inputmode="decimal">
      <span style="font-size:13px;color:var(--text2)">${label}</span>
    </div>`;
  }).join('');
}

function selectReimbFrom(el) {
  document.querySelectorAll('#reimbFrom .chip').forEach(e => e.classList.remove('selected-from'));
  el.classList.add('selected-from');
}
function selectReimbTo(el) {
  document.querySelectorAll('#reimbTo .chip').forEach(e => e.classList.remove('selected-to'));
  el.classList.add('selected-to');
}
function selectChipSingle(el, containerId) {
  document.querySelectorAll(`#${containerId} .chip`).forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}

function fillReimb(fromID, toID, amount) {
  document.getElementById('reimbAmount').value = amount.toFixed(2);
  document.querySelectorAll('#reimbFrom .chip').forEach(e => {
    e.classList.toggle('selected-from', e.dataset.id === fromID);
  });
  document.querySelectorAll('#reimbTo .chip').forEach(e => {
    e.classList.toggle('selected-to', e.dataset.id === toID);
  });
}

// ===== Save =====
function saveExpense() {
  try {
  const amount = parseFloat(document.getElementById('expAmount').value.replace(',', '.'));
  const title = document.getElementById('expTitle').value.trim();
  if (!amount || amount <= 0 || !title || !selectedPaidByID) return showToast('Remplissez tous les champs');

  const splitAmongIDs = [...document.querySelectorAll('#expSplitAmong .chip.selected')].map(e => e.dataset.id);
  if (!splitAmongIDs.length) return showToast('Sélectionnez au moins un participant');

  let customSplits = {};
  if (selectedSplitType !== 'equal') {
    document.querySelectorAll('#customSplitFields input').forEach(input => {
      customSplits[input.dataset.pid] = parseFloat(input.value.replace(',', '.')) || 0;
    });
  }

  const expense = {
    id: generateUUID(),
    title: title,
    amount: amount,
    date: new Date(document.getElementById('expDate').value || Date.now()).toISOString(),
    paidByID: selectedPaidByID,
    splitAmongIDs: splitAmongIDs,
    splitType: selectedSplitType,
    customSplits: customSplits,
    categoryID: selectedCatID || null,
    location: '',
    notes: document.getElementById('expNotes').value || '',
    receiptImageData: null,
    campaignID: state.campaign.id
  };

  state.expenses.push(expense);
  state.campaign.expenseIDs.push(expense.id);

  selectedCatID = null;
  selectedPaidByID = null;
  selectedSplitType = 'equal';

  closeModal();
  updateURLHash();
  render();
  showToast(t('new_expense_added'));
  } catch(e) { alert('Erreur dépense: ' + e.message + '\n' + e.stack); }
}

function saveReimbursement() {
  const amount = parseFloat(document.getElementById('reimbAmount').value.replace(',', '.'));
  const fromEl = document.querySelector('#reimbFrom .selected-from');
  const toEl = document.querySelector('#reimbTo .selected-to');
  const methodEl = document.querySelector('#reimbMethod .selected');

  if (!amount || amount <= 0 || !fromEl || !toEl) return showToast('Remplissez tous les champs');
  if (fromEl.dataset.id === toEl.dataset.id) return showToast('Sélectionnez deux personnes différentes');

  const reimb = {
    id: generateUUID(),
    amount: amount,
    date: new Date(document.getElementById('reimbDate').value || Date.now()).toISOString(),
    fromID: fromEl.dataset.id,
    toID: toEl.dataset.id,
    paymentMethodID: methodEl ? methodEl.dataset.id : null,
    notes: '',
    campaignID: state.campaign.id,
    isPartial: false
  };

  state.reimbursements.push(reimb);
  state.campaign.reimbursementIDs.push(reimb.id);

  closeModal();
  updateURLHash();
  render();
  showToast(t('new_reimb_added'));
}

function deleteExpense(id) {
  state.expenses = state.expenses.filter(e => e.id !== id);
  state.campaign.expenseIDs = state.campaign.expenseIDs.filter(eid => eid !== id);
  updateURLHash();
  render();
  showToast(t('deleted'));
}

function deleteReimbursement(id) {
  state.reimbursements = state.reimbursements.filter(r => r.id !== id);
  state.campaign.reimbursementIDs = state.campaign.reimbursementIDs.filter(rid => rid !== id);
  updateURLHash();
  render();
  showToast(t('deleted'));
}

async function updateURLHash() {
  const json = stateToJSON();
  const encoded = await encodeData(json);
  history.replaceState(null, '', '#' + encoded);
}

// ===== Utils =====
function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function copyToClipboard(text, msg) {
  navigator.clipboard.writeText(text).then(() => showToast(msg)).catch(e => alert('Copie échouée: ' + e.message));
}

function copyJSON() {
  try {
    const json = stateToJSON();
    navigator.clipboard.writeText(json).then(() => showToast(t('json_copied'))).catch(e => alert('Copie JSON échouée: ' + e.message));
  } catch(e) { alert('Erreur JSON: ' + e.message); }
}

// ===== Init =====
window.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('landingDesc').textContent = t('landing_desc');
  if (await loadFromURL()) {
    showApp();
  }
});
</script>
</body>
